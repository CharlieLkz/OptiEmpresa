# IP estática del Nodo B. Copiar a /etc/netplan/ y aplicar.
# CAMBIA "enp0s3" por el nombre real de tu tarjeta (míralo con: ip a)
network:
  version: 2
  renderer: networkd
  ethernets:
    enp0s3:
      dhcp4: no
      addresses: [10.0.0.20/24]
      nameservers:
        addresses: [10.0.0.20, 10.0.0.10]   # su Pi-hole y el del Nodo A
